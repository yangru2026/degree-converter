<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弥生美瞳 · 花色素材库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: #FFF5F7;
  min-height: 100vh;
  color: #333;
}
.header {
  background: #fff;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(255,107,157,0.1);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 20px;
  color: #FF6B9D;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1::before {
  content: '👁️';
  font-size: 24px;
}
.refresh-btn {
  padding: 8px 16px;
  background: #FF6B9D;
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
  font-weight: 500;
}
.refresh-btn:hover { background: #E85A8A; }
.refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.filters input, .filters select {
  padding: 10px 14px;
  border: 2px solid #FFD6E5;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  background: #fff;
  transition: border-color 0.2s;
}
.filters input:focus, .filters select:focus {
  border-color: #FF6B9D;
}
.filters input {
  flex: 1;
  min-width: 200px;
}
.filters select {
  min-width: 120px;
  cursor: pointer;
}
.stats {
  margin-top: 8px;
  font-size: 13px;
  color: #999;
  display: flex;
  align-items: center;
  gap: 10px;
}
.stats b { color: #FF6B9D; }
.sync-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #f0f0f0;
  color: #888;
}
.sync-status.ok { background: #E8F5E9; color: #4CAF50; }
.sync-status.error { background: #FFEBEE; color: #F44336; }
.container {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.loading {
  text-align: center;
  padding: 80px 20px;
  color: #FF6B9D;
}
.loading-icon {
  font-size: 40px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.25s ease;
  border: 1px solid transparent;
  position: relative;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(255,107,157,0.15);
  border-color: #FFD6E5;
}
.card-img {
  width: 100%;
  height: 160px;
  position: relative;
  overflow: hidden;
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.card:hover .card-img img {
  transform: scale(1.05);
}
.card-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.9);
  font-size: 14px;
  gap: 6px;
}
.card-img-placeholder .placeholder-icon {
  font-size: 28px;
  opacity: 0.7;
}
.card-img-placeholder .placeholder-name {
  font-size: 16px;
  font-weight: 600;
  opacity: 0.9;
}
.card-img-placeholder .placeholder-tag {
  font-size: 11px;
  padding: 2px 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
}
.card-info {
  padding: 14px 16px 16px;
}
.card-name {
  font-size: 17px;
  font-weight: 700;
  color: #222;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.tag {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
.tag-series {
  background: #FFF0F5;
  color: #FF6B9D;
  border: 1px solid #FFD6E5;
}
.tag-color {
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
}
.card-params {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: #888;
}
.card-params span {
  display: flex;
  align-items: center;
  gap: 3px;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: #999;
  font-size: 15px;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff;
  border-radius: 20px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: modalIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 20px 20px 0;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border: none;
  background: #f5f5f5;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  color: #999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 10;
}
.modal-close:hover {
  background: #FF6B9D;
  color: #fff;
}
.modal-title {
  font-size: 22px;
  font-weight: 700;
  color: #222;
  margin-bottom: 6px;
  padding-right: 40px;
}
.modal-subtitle {
  color: #FF6B9D;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
}
.modal-body {
  padding: 0 20px 20px;
}
.modal-images {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.modal-image-item {
  flex-shrink: 0;
  width: 260px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.modal-image-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
.modal-image-placeholder {
  width: 260px;
  height: 200px;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  gap: 8px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.modal-image-placeholder .ph-icon { font-size: 32px; opacity: 0.6; }
.modal-image-placeholder .ph-text { font-size: 13px; }
.modal-image-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.5));
  color: #fff;
  font-size: 12px;
  font-weight: 500;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.detail-item {
  background: #FFF8FA;
  padding: 10px 14px;
  border-radius: 10px;
}
.detail-item.full { grid-column: span 2; }
.detail-item label {
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 3px;
}
.detail-item value {
  font-size: 14px;
  color: #333;
  font-weight: 500;
}
.copy-section {
  background: #FFF8FA;
  border-radius: 12px;
  padding: 16px;
  position: relative;
  border: 1px solid #FFD6E5;
}
.copy-section label {
  font-size: 12px;
  color: #FF6B9D;
  font-weight: 600;
  display: block;
  margin-bottom: 8px;
}
.copy-text {
  font-size: 14px;
  line-height: 1.7;
  color: #444;
  white-space: pre-wrap;
  max-height: 160px;
  overflow-y: auto;
  padding-right: 8px;
}
.copy-btn {
  position: absolute;
  top: 12px; right: 12px;
  padding: 6px 14px;
  background: #FF6B9D;
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.copy-btn:hover { background: #E85A8A; }
.copy-btn.copied {
  background: #52c41a;
}
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .filters input { min-width: 100%; }
  .detail-grid { grid-template-columns: 1fr; }
  .detail-item.full { grid-column: span 1; }
  .modal { max-height: 90vh; }
  .modal-images { flex-direction: column; }
  .modal-image-item, .modal-image-placeholder { width: 100%; height: 220px; }
  .modal-image-item img { height: 220px; }
  .header-top { flex-wrap: wrap; gap: 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>弥生美瞳 · 花色素材库</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)">
      <span class="refresh-icon">🔄</span>
      <span>刷新数据</span>
    </button>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="搜索花名..." onkeyup="render()">
    <select id="seriesFilter" onchange="render()">
      <option value="">全部系列</option>
    </select>
    <select id="colorFilter" onchange="render()">
      <option value="">全部色系</option>
    </select>
  </div>
  <div class="stats">
    <span>共 <b id="total">0</b> 款花色，当前显示 <b id="shown">0</b> 款</span>
    <span class="sync-status" id="syncStatus">⏳ 加载中...</span>
  </div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="loading-icon">💫</div>
    <div style="margin-top:12px;color:#999">正在加载花色数据...</div>
  </div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">🔍</div>
    <div>没有找到匹配的花色</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-subtitle" id="mSubtitle"></div>
    </div>
    <div class="modal-body">
      <div class="modal-images" id="mImages"></div>
      <div class="detail-grid" id="mGrid"></div>
      <div class="copy-section" id="mCopy" style="display:none">
        <label>📋 描述话术（点击右上角复制）</label>
        <div class="copy-text" id="mText"></div>
        <button class="copy-btn" onclick="copyText()">复制</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
// === 配置 ===
const DATA_URL = 'data.json';
// =================

let DATA = [];
let ALL_DATA = [];

const colorMap = {
  '棕色系': '#8B4513',
  '灰色系': '#808080',
  '蓝色系': '#4169E1',
  '粉色系': '#FF69B4',
  '紫色系': '#9370DB',
  '黑色系': '#333333',
  '绿色系': '#228B22',
  '混血系': '#FF6347',
  '其他': '#999999'
};

async function loadData(isManual = false) {
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('syncStatus');
  const loading = document.getElementById('loading');
  const grid = document.getElementById('grid');
  
  if (isManual) {
    btn.classList.add('spinning');
    status.textContent = '⏳ 刷新中...';
  }
  
  try {
    // 加时间戳防止缓存
    const url = DATA_URL + '?t=' + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    ALL_DATA = Array.isArray(json) ? json : (json.data || []);
    DATA = [...ALL_DATA];
    
    initFilters();
    render();
    
    status.textContent = '✅ ' + new Date().toLocaleTimeString('zh-CN') + ' 已同步';
    status.className = 'sync-status ok';
    loading.style.display = 'none';
    grid.style.display = '';
    
    if (isManual) {
      showToast('数据已更新！共 ' + DATA.length + ' 款花色');
    }
  } catch (err) {
    console.error(err);
    status.textContent = '❌ 同步失败: ' + err.message;
    status.className = 'sync-status error';
    if (isManual) showToast('刷新失败: ' + err.message);
    // 如果是首次加载失败，显示空数据提示
    if (!ALL_DATA.length) {
      loading.innerHTML = '<div style="font-size:40px">😿</div><div style="margin-top:12px;color:#999">数据加载失败<br>请检查网络或点击「刷新数据」重试</div>';
    }
  } finally {
    btn.classList.remove('spinning');
  }
}

function initFilters() {
  const series = [...new Set(DATA.map(d => d.系列).filter(Boolean))].sort();
  const colors = [...new Set(DATA.map(d => d.色系).filter(Boolean))].sort();
  const sSel = document.getElementById('seriesFilter');
  const cSel = document.getElementById('colorFilter');
  
  // 保留当前选中值
  const curS = sSel.value;
  const curC = cSel.value;
  
  sSel.innerHTML = '<option value="">全部系列</option>';
  cSel.innerHTML = '<option value="">全部色系</option>';
  series.forEach(s => sSel.add(new Option(s, s)));
  colors.forEach(c => cSel.add(new Option(c, c)));
  
  sSel.value = curS;
  cSel.value = curC;
  document.getElementById('total').textContent = DATA.length;
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const s = document.getElementById('seriesFilter').value;
  const c = document.getElementById('colorFilter').value;
  
  const filtered = DATA.filter(d => {
    const matchQ = !q || d.花名?.toLowerCase().includes(q) || d.系列?.toLowerCase().includes(q);
    const matchS = !s || d.系列 === s;
    const matchC = !c || d.色系 === c;
    return matchQ && matchS && matchC;
  });
  
  document.getElementById('shown').textContent = filtered.length;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  grid.innerHTML = filtered.map(d => {
    const bgColor = colorMap[d.色系] || '#999';
    // 支持多张图片（数组或字符串）
    const eyeImgs = d.上眼图 ? (Array.isArray(d.上眼图) ? d.上眼图 : [d.上眼图]).filter(Boolean) : [];
    const hasImg = eyeImgs.length > 0;
    
    const imgHtml = hasImg
      ? `<img src="${eyeImgs[0]}" alt="${d.花名}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'card-img-placeholder\' style=\'background:${bgColor}\'><div class=\'placeholder-icon\'>👁️</div><div class=\'placeholder-name\'>${d.花名}</div><div class=\'placeholder-tag\'>${d.色系||'未分类'}</div></div>'">`
      : `<div class="card-img-placeholder" style="background:${bgColor}">
          <div class="placeholder-icon">👁️</div>
          <div class="placeholder-name">${d.花名}</div>
          <div class="placeholder-tag">${d.色系 || '未分类'}</div>
        </div>`;
    return `
    <div class="card" onclick='openModal(${JSON.stringify(d).replace(/'/g, "\\'")})'>
      <div class="card-img">
        ${imgHtml}
      </div>
      <div class="card-info">
        <div class="card-name">
          <span>${d.花名}</span>
          <span style="font-size:13px;color:#999;font-weight:400">${d.直径}mm</span>
        </div>
        <div class="card-tags">
          <span class="tag tag-series">${d.系列 || '未分类'}</span>
          <span class="tag tag-color" style="background:${bgColor}">${d.色系 || '其他'}</span>
        </div>
        <div class="card-params">
          <span>👁️ ${d.着色直径 || d.直径}mm</span>
          <span>💧 ${d.含水量}%</span>
          <span>🫧 ${d.透氧量}Dk/t</span>
        </div>
      </div>
    </div>
  `}).join('');
}

function openModal(d) {
  document.getElementById('mTitle').textContent = d.花名;
  document.getElementById('mSubtitle').textContent = `${d.品牌} · ${d.系列} · ${d.抛期}`;
  
  const mImages = document.getElementById('mImages');
  const eyeImgs = d.上眼图 ? (Array.isArray(d.上眼图) ? d.上眼图 : [d.上眼图]).filter(Boolean) : [];
  const lensImgs = d.镜片实图 ? (Array.isArray(d.镜片实图) ? d.镜片实图 : [d.镜片实图]).filter(Boolean) : [];
  const bgColor = colorMap[d.色系] || '#999';
  
  let imgHtml = '';
  
  // 上眼图（多张）
  if (eyeImgs.length > 0) {
    eyeImgs.forEach((src, idx) => {
      imgHtml += `<div class="modal-image-item">
        <img src="${src}" alt="上眼图${eyeImgs.length>1?idx+1:''}" loading="lazy">
        <div class="modal-image-label">👁️ 上眼效果图${eyeImgs.length>1?' '+ (idx+1) + '/' + eyeImgs.length:''}</div>
      </div>`;
    });
  } else {
    imgHtml += `<div class="modal-image-placeholder" style="background:${bgColor}">
      <div class="ph-icon">👁️</div>
      <div class="ph-text">暂无上眼图</div>
    </div>`;
  }
  
  // 镜片图（多张）
  if (lensImgs.length > 0) {
    lensImgs.forEach((src, idx) => {
      imgHtml += `<div class="modal-image-item">
        <img src="${src}" alt="镜片图${lensImgs.length>1?idx+1:''}" loading="lazy">
        <div class="modal-image-label">🔍 镜片实拍图${lensImgs.length>1?' '+ (idx+1) + '/' + lensImgs.length:''}</div>
      </div>`;
    });
  } else {
    imgHtml += `<div class="modal-image-placeholder" style="background:${bgColor};opacity:0.7">
      <div class="ph-icon">🔍</div>
      <div class="ph-text">暂无镜片图</div>
    </div>`;
  }
  
  mImages.innerHTML = imgHtml;
  
  const fields = [
    ['系列', d.系列], ['色系', d.色系], ['品牌', d.品牌], ['抛期', d.抛期],
    ['材质', d.材质], ['直径', d.直径 + 'mm'], ['着色直径', (d.着色直径 || d.直径) + 'mm'],
    ['基弧', d.基弧 + 'mm'], ['含水量', d.含水量 + '%'], ['透氧量', d.透氧量 + ' Dk/t'],
    ['高光', d.高光 || '—']
  ];
  
  document.getElementById('mGrid').innerHTML = fields.map(([k, v]) => `
    <div class="detail-item ${k === '高光' ? 'full' : ''}">
      <label>${k}</label>
      <value>${v || '—'}</value>
    </div>
  `).join('');
  
  const copySec = document.getElementById('mCopy');
  const copyText = document.getElementById('mText');
  if (d.描述话术) {
    copySec.style.display = 'block';
    copyText.textContent = d.描述话术;
  } else {
    copySec.style.display = 'none';
  }
  
  document.querySelector('.copy-btn').textContent = '复制';
  document.querySelector('.copy-btn').classList.remove('copied');
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

function copyText() {
  const text = document.getElementById('mText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    showToast('话术已复制！');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// 页面加载时自动拉取数据
loadData();
</script>
</body>
</html>
